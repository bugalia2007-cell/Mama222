services:
  - type: worker
    name: txtExtractor-bot
    env: python
    plan: free
    pythonVersion: "3.11.2"
    buildCommand: "apt-get install -y ffmpeg aria2 wget 2>/dev/null || true && pip install -r requirements.txt"
    startCommand: "python main.py"
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: AUTH_USERS
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.2"
